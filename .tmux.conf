set-environment -g PATH "$HOME/go/bin:$HOME/.local/bin:$PATH"

set -g default-command "${SHELL}"

# remap prefix to Control + a
unbind C-b
set-option -g prefix C-a

set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

set -g default-terminal "tmux-256color"

set -gq allow-passthrough on

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

set -g prefix2 C-a                        # GNU-Screen compatible prefix
bind C-a send-prefix -2

set -g pane-border-status off

# create new session
bind C-c new-session

# splits
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# windows
bind c new-window -c "#{pane_current_path}"

# copy mode
unbind [
bind [ run-shell "~/scripts/copy_mode_with_line_numbers.sh"

unbind C
bind C display-popup -w 70 -h 20% -b rounded -S "fg=#5f875f" -T " 🌳 New Worktree " -E "$HOME/scripts/tmux_worktree_prompt.sh"

# navigate splits
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# navigate splits without prefix (Alt-hjkl)
# if current pane is (n)vim, pass keys through to Neovim; otherwise move tmux panes
is_vim='ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +([[:alnum:]_./-]+/)?(g?view|n?vim?)(diff)?$"'
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# navigate windows
bind C-h previous-window
bind C-l next-window

# capture pane to neovim
bind Enter capture-pane -S "-5000" \; save-buffer /tmp/tmux_capture.txt \; new-window 'nvim /tmp/tmux_capture.txt -c "normal G" -c "set ft=log"'

bind r source-file ~/.tmux.conf \; display-message "█▓░ reloaded"

# toggle layout
bind Space next-layout

# toggle status bar
bind t set status

# synchronize panes toggle
bind a set-window-option synchronize-panes \; display-message "█▓░ synchronize #{?pane_synchronized,on,off}"

# session switcher (sesh)
bind-key "e" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# window switchers
bind W display-popup -E "\
tmux list-windows -F '#{window_index}: #{window_name}' |\
fzf --reverse --header 'find-window (current session)' |\
cut -d':' -f1 |\
xargs tmux select-window -t"

unbind w
bind w display-popup -E "\
tmux list-windows -a -F '#{session_name}:#{window_index}: #{window_name}' |\
fzf --reverse --header 'find-window (all sessions)' |\
sed 's/:/ /g' |\
awk '{print \$1\":\"\$2}' |\
xargs tmux switch-client -t"

# kill pane — with worktree cleanup if applicable
bind x if-shell '[ -f /tmp/tmux_worktrees/#{pane_id} ]' \
  'run-shell -b "$HOME/scripts/tmux_worktree_cleanup.sh #{pane_id}"' \
  'confirm-before -p "kill-pane #P? (y/n)" kill-pane'

# delete windows with fzf
bind X display-popup -E "\
tmux list-windows -a -F '#{session_name}:#{window_index}: #{window_name}' |\
fzf --reverse --multi --header 'delete-window (Tab for multi-select)' |\
sed 's/:/ /g' |\
awk '{print \$1\":\"\$2}' |\
xargs -I {} tmux kill-window -t {}"

# ─────────────────────────────────────────────
# panes — inactive pane contrast
# ─────────────────────────────────────────────
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#5f875f"
set -g pane-border-lines "heavy"

# dim ANSI palette in inactive panes (helps non-TUI tools)
# set-hook -g after-select-pane 'run-shell "$HOME/scripts/tmux_inactive_palette.sh #{hook_window}"'
# set-hook -g after-split-window 'run-shell "$HOME/scripts/tmux_inactive_palette.sh #{hook_window}"'
# set-hook -g after-new-window 'run-shell "$HOME/scripts/tmux_inactive_palette.sh #{hook_window}"'
# set-hook -g after-kill-pane 'run-shell "$HOME/scripts/tmux_inactive_palette.sh #{hook_window}"'
# set-hook -g window-layout-changed 'run-shell "$HOME/scripts/tmux_inactive_palette.sh #{hook_window}"'
# set-hook -g client-session-changed 'run-shell "$HOME/scripts/tmux_inactive_palette.sh"'
# set-hook -g client-attached 'run-shell "$HOME/scripts/tmux_inactive_palette.sh"'
# run-shell "$HOME/scripts/tmux_inactive_palette.sh"

# ─────────────────────────────────────────────
# clipboard — OSC 52 (works over SSH/mosh)
# ─────────────────────────────────────────────
set -s set-clipboard on
set -ag terminal-overrides "vte*:XT:Ms=\\E]52;c;%p2%s\\7,xterm*:XT:Ms=\\E]52;c;%p2%s\\7"

# ─────────────────────────────────────────────
# status line — miasma palette
# ─────────────────────────────────────────────
#   bg       #222222    bg_dark  #1c1c1c
#   fg       #d7c483    fg_dark  #c2c2b0
#   comment  #666666    green    #5f875f
#   olive    #78824b    orange   #bb7744
#   red      #b36d43    yellow   #c9a554
#   brown    #685742    visual   #78824b

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 2

set -g status-style "bg=terminal,fg=#666666"

set -g status-left-length 40
set -g status-right-length 40

# mode indicator: ◇ normal, ◈ prefix
# mode indicator
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @mode_indicator_empty_prompt ' ◇'
set -g @mode_indicator_empty_mode_style 'bg=terminal,fg=#666666'
set -g @mode_indicator_prefix_prompt ' ◈'
set -g @mode_indicator_prefix_mode_style 'bg=terminal,fg=#5f875f'
set -g @mode_indicator_copy_prompt ' ◈'
set -g @mode_indicator_copy_mode_style 'bg=terminal,fg=#c9a554'
set -g @mode_indicator_sync_prompt ' ◈'
set -g @mode_indicator_sync_mode_style 'bg=terminal,fg=#b36d43'

set -g status-left '#{tmux_mode_indicator}'

# session name on the right
set -g status-right "#[fg=#685742] #S "

# window tabs
setw -g window-status-format "#[fg=#666666] ░ #W "
setw -g window-status-current-format "#[fg=#d7c483] ▓░ #W "
setw -g window-status-separator ""

# messaging
set -g message-style "bg=#333333,fg=#d7c483"
set -g message-command-style "bg=#333333,fg=#c9a554"

# copy mode
setw -g mode-style "bg=#78824b,fg=#222222"

# clock
set -g clock-mode-colour "#5f875f"

# ─────────────────────────────────────────────
# plugins
# ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# tmux fingers
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-highlight-style "fg=#b36d43,bold"

# yank
set -g @plugin 'tmux-plugins/tmux-yank'

# session management
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# set -g extended-keys on
# set -g extended-keys-format csi-u

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
